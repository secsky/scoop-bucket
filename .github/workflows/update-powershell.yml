name: Update PowerShell

on:
  workflow_dispatch:
  schedule:
    - cron: "43 18 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update manifest
        shell: pwsh
        run: ./scripts/Update-PowerShell.ps1

      - name: Validate manifest JSON
        shell: pwsh
        run: |
          Get-Content ./bucket/powershell.json -Raw | ConvertFrom-Json | Out-Null

      - name: Commit changes
        shell: pwsh
        run: |
          if (-not (git status --porcelain -- bucket/powershell.json)) {
            Write-Host "No PowerShell update found."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/powershell.json
          git commit -m "Update PowerShell manifest"
          git push
